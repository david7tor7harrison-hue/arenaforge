<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
My Profile
</title>

<link rel="stylesheet"
href="my-profile.css">

</head>

<body>

<div class="container">

<div class="login-box"
id="loginBox">

<h1>
⚔ ArenaForge
</h1>

<h2>
My Profile
</h2>

<input
type="text"
id="playerKey"
placeholder="Player Key">

<input
type="password"
id="password"
placeholder="Password">

<button
id="loginBtn">
Login
</button>

</div>

<div
class="profile-box"
id="profileBox"
style="display:none;">

<h1>
My Profile
</h1>

<div class="section">

<h3>
Account Information
</h3>

<label>
Player Key
</label>

<input
type="text"
id="profilePlayerKey"
readonly>

<label>
Email
</label>

<input
type="text"
id="profileEmail"
readonly>
  
<label>
Solo UID
</label>

<input
type="text"
id="soloUid"
readonly>

<label>
Status
</label>

<input
type="text"
id="profileStatus"
readonly>

</div>

<div class="section">

<h3>
Payment Information
</h3>

<label>
UPI ID
</label>

<input
type="text"
id="upi">

</div>

<div class="section">

<h3>
Duo Team
</h3>

<input
type="text"
id="duoP1Uid"
placeholder="Duo Player 1 UID">

<input
type="text"
id="duoP2Uid"
placeholder="Duo Player 2 UID">

</div>

<div class="section">

<h3>
Squad Team
</h3>

<input
type="text"
id="squadP1Uid"
placeholder="Squad Player 1 UID">

<input
type="text"
id="squadP2Uid"
placeholder="Squad Player 2 UID">

<input
type="text"
id="squadP3Uid"
placeholder="Squad Player 3 UID">

<input
type="text"
id="squadP4Uid"
placeholder="Squad Player 4 UID">

</div>

<div class="section">

<h3>
Change Password
</h3>

<input
type="password"
id="currentPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

</div>

<button
id="saveBtn">
Save Profile
</button>

</div>

</div>

  <div id="popupOverlay" class="popup-overlay">
	<div class="popup-box">
		<h3 id="popupTitle">
			Alert
		</h3>
		
		<p id="popupMessage">
			Message
		</p>
		
		<button id="popupBtn" onclick="closePopup()">
			OK
		</button>
		
	</div>
</div>

<script
src="my-profile.js">
</script>

</body>

</html>
